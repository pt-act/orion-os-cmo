project:
  name: orion-os-cmo
  objective: >
    Run a weekly autonomous marketing pass on a product URL that produces one
    consolidated, prioritized brief of drafted, review-ready marketing work
    across SEO, GEO, content, social, code, and creator outreach — keeping all
    product data first-party and every external action behind an auditable tool.
  created: 2026-06-19
  status: complete            # 23 specs approved (incl. transport-self-hosted + agent-directives); 184 tests green; only concrete Claude LLMClient deferred for live e2e
  operator: human:riata

# Specs-first: every entry below has a full 3-phase set authored under
# specs/<id>/ (planning/requirements.md, spec.md, tasks.md). Interface summaries
# here are indexes; the full contracts live in each spec.md.
#
# DAG layers:  client-workspace (root) → strategy-store → adapters + agents →
#              weekly-orchestrator (integration).

specs:

  # ── ROOT: per-client durable store ─────────────────────────────────────────
  - id: client-workspace
    title: Per-client operational workspace
    type: unit
    status: approved                      # Groups 1-6 implemented, 17/17 tests (4 PBT invariants)
    file: specs/client-workspace/spec.md
    depends_on: []
    produces:
      - name: workspace
        shape: "WorkspaceStore API over .agents/memory_bank-production/ — strategy/metrics/runs/outputs/approvals/config; append-only metrics, edit-preserving, publish-gated"
        consumers: [strategy-store, weekly-orchestrator]
    consumes: []

  # ── strategy context (built) ────────────────────────────────────────────────
  - id: strategy-store
    title: Strategy & brand-voice store
    type: unit
    status: approved                      # Groups 1-4 implemented, 13/13 tests
    file: specs/strategy-store/spec.md
    depends_on: [client-workspace]
    produces:
      - name: strategy_context
        shape: "doc{ brand_voice, icp, competitors[]{name,url,positioning,source}, positioning, growth_playbook, _meta{version} }; versioned, hand-editable"
        consumers: [agent-seo, agent-geo, agent-reddit, agent-x, agent-linkedin, agent-writer, agent-coding, agent-influencer, agent-ugc, weekly-orchestrator]
    consumes:
      - { name: workspace, from: client-workspace }

  # ── ADAPTERS (MCP tool contracts; thin façades over AgentCash/x402) ──────────
  - id: adapter-analytics-ingest
    title: Analytics ingest adapter (GA4 + Search Console)
    type: unit
    status: approved              # GA4+GSC+CWV façade, 7 tests (idempotency/schema/structured-error PBT)
    file: specs/adapter-analytics-ingest/spec.md
    depends_on: []
    produces:
      - name: tool.fetch_analytics
        shape: "fetch_analytics() -> AnalyticsSnapshot{sessions,clicks,impressions,top_pages[],core_web_vitals}; read-only, free"
        consumers: [agent-seo, agent-geo, weekly-orchestrator]
    consumes: []

  - id: adapter-seo-audit
    title: SEO audit adapter
    type: unit
    status: approved              # provider+Lighthouse merge + normalized score, 7 tests
    file: specs/adapter-seo-audit/spec.md
    depends_on: []
    produces:
      - name: tool.seo_audit
        shape: "seo_audit(url) -> AuditReport{score:0-100, issues[]{severity,type,fix,snippet}, serp_snapshot[]}"
        consumers: [agent-seo]
    consumes: []

  - id: adapter-geo-probe
    title: GEO / AI-visibility probe adapter
    type: unit
    status: approved              # per-(model,question) grounded mention flags, 7 tests
    file: specs/adapter-geo-probe/spec.md
    depends_on: []
    produces:
      - name: tool.geo_probe
        shape: "geo_probe(brand, questions[], models[]) -> GeoReport{score, per_model[]{model,mentioned,position,sentiment}, competitor_gaps[]}"
        consumers: [agent-geo]
    consumes: []

  - id: adapter-reddit-listen
    title: Reddit listening adapter
    type: unit
    status: approved              # one-call sourced Thread[], no_results-not-empty, 5 tests
    file: specs/adapter-reddit-listen/spec.md
    depends_on: []
    produces:
      - name: tool.reddit_search
        shape: "reddit_search(keywords[], subreddits[]?) -> Thread[]{url, subreddit, intent, engagement, snippet}"
        consumers: [agent-reddit]
    consumes: []

  - id: adapter-creator-discovery
    title: Creator / influencer discovery adapter
    type: unit
    status: approved              # Creator[] with audience_fit grounding (null-not-fabricated), 5 tests
    file: specs/adapter-creator-discovery/spec.md
    depends_on: []
    produces:
      - name: tool.discover_creators
        shape: "discover_creators(niche, platform, follower_tier) -> Creator[]{handle, url, followers, email?, audience_fit}"
        consumers: [agent-influencer]
    consumes: []

  - id: adapter-video-gen
    title: UGC video generation adapter (metered)
    type: unit
    status: approved              # quote-then-cap-gate before render, est_cost provenance, 5 tests
    file: specs/adapter-video-gen/spec.md
    depends_on: []
    produces:
      - name: tool.generate_video
        shape: "generate_video(prompt, aspect, resolution, audio) -> VideoAsset{mp4_url, duration_s, est_cost}; HIGH-COST, quote+cap before render"
        consumers: [agent-ugc]
    consumes: []

  - id: adapter-github-pr
    title: GitHub PR adapter
    type: unit
    status: approved              # open/update only (never-merge gate), idempotent, 7 tests
    file: specs/adapter-github-pr/spec.md
    depends_on: []
    produces:
      - name: tool.open_pr
        shape: "open_pr(repo, branch, diff, description) -> PRResult{pr_url}; side-effecting but reversible (PR != merge)"
        consumers: [agent-coding]
    consumes: []

  - id: adapter-social-publish
    title: Social publish adapter (human-gated)
    type: unit
    status: approved              # absolute approval gate + content-hash idempotency, 7 tests
    file: specs/adapter-social-publish/spec.md
    depends_on: []
    produces:
      - name: tool.publish_post
        shape: "publish_post(platform, content, approval_token) -> PostResult{url,id}; IRREVERSIBLE — refuses without a valid approval token"
        consumers: [weekly-orchestrator]
    consumes: []

  - id: adapter-cms-publish
    title: CMS publish adapter (human-gated)
    type: unit
    status: approved              # approval-gate-first + slug idempotency, 7 tests
    file: specs/adapter-cms-publish/spec.md
    depends_on: []
    produces:
      - name: tool.publish_article
        shape: "publish_article(cms, article, approval_token) -> PublishResult{url}; IRREVERSIBLE — refuses without approval"
        consumers: [weekly-orchestrator]
    consumes: []

  # ── AGENT WORKERS ───────────────────────────────────────────────────────────
  - id: agent-seo
    title: SEO agent
    type: unit
    status: approved              # strategy-conditioned ranking, issue_id provenance gate, 8 tests
    file: specs/agent-seo/spec.md
    depends_on: [strategy-store, adapter-seo-audit, adapter-analytics-ingest]
    produces:
      - name: seo_findings
        shape: "report{ranked_fixes[]{issue,fix,snippet,severity}, keyword_gaps[]}"
        consumers: [agent-writer, agent-coding, weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: tool.seo_audit, from: adapter-seo-audit }
      - { name: tool.fetch_analytics, from: adapter-analytics-ingest }

  - id: agent-geo
    title: GEO agent
    type: unit
    status: approved              # score+delta+grounded fixes, gap_ref provenance, 7 tests
    file: specs/agent-geo/spec.md
    depends_on: [strategy-store, adapter-geo-probe, adapter-analytics-ingest]
    produces:
      - name: geo_findings
        shape: "report{score, fixes[]{fix,snippet}, competitor_gaps[]}"
        consumers: [agent-coding, agent-writer, weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: tool.geo_probe, from: adapter-geo-probe }
      - { name: tool.fetch_analytics, from: adapter-analytics-ingest }

  - id: agent-reddit
    title: Reddit agent
    type: unit
    status: approved              # high-intent reply drafts, url provenance, per-thread skip, 3 tests
    file: specs/agent-reddit/spec.md
    depends_on: [strategy-store, adapter-reddit-listen]
    produces:
      - name: reddit_drafts
        shape: "item[]{thread_url, intent, draft_reply}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: tool.reddit_search, from: adapter-reddit-listen }

  - id: agent-x
    title: X / Twitter agent
    type: unit
    status: approved              # strategy-only posts+threads, schema-validated retry-once, 4 tests
    file: specs/agent-x/spec.md
    depends_on: [strategy-store]
    produces:
      - name: x_drafts
        shape: "item[]{kind:post|thread, content}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }

  - id: agent-linkedin
    title: LinkedIn agent
    type: unit
    status: approved              # founder-voice posts, schema-validated, 3 tests
    file: specs/agent-linkedin/spec.md
    depends_on: [strategy-store]
    produces:
      - name: linkedin_drafts
        shape: "item[]{content}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }

  - id: agent-writer
    title: Articles writer agent
    type: unit
    status: approved              # keyword-gap-targeted drafts + GEO overlay, provenance, 7 tests
    file: specs/agent-writer/spec.md
    depends_on: [strategy-store, agent-seo, agent-geo]
    produces:
      - name: articles
        shape: "item[]{title, body, target_keyword, meta}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: seo_findings, from: agent-seo }
      - { name: geo_findings, from: agent-geo }

  - id: agent-coding
    title: Coding agent (technical SEO/GEO fixes)
    type: unit
    status: approved              # findings -> one review-ready PR, provenance + never-merge, 6 tests
    file: specs/agent-coding/spec.md
    depends_on: [strategy-store, agent-seo, agent-geo, adapter-github-pr]
    produces:
      - name: pr_set
        shape: "item[]{pr_url, fixes_applied[]}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: seo_findings, from: agent-seo }
      - { name: geo_findings, from: agent-geo }
      - { name: tool.open_pr, from: adapter-github-pr }

  - id: agent-influencer
    title: Influencer agent (creator discovery + outreach)
    type: unit
    status: approved              # rank by grounded fit_score, top_n cap, unmodified-record provenance, 4 tests
    file: specs/agent-influencer/spec.md
    depends_on: [strategy-store, adapter-creator-discovery]
    produces:
      - name: creator_outreach
        shape: "item[]{creator, fit_score, draft_message}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: tool.discover_creators, from: adapter-creator-discovery }

  - id: agent-ugc
    title: UGC video agent
    type: unit
    status: approved              # brief->render, cap-signal stops loop, brief provenance, 4 tests
    file: specs/agent-ugc/spec.md
    depends_on: [strategy-store, adapter-video-gen]
    produces:
      - name: video_assets
        shape: "item[]{mp4_url, brief, aspect}"
        consumers: [weekly-orchestrator]
    consumes:
      - { name: strategy_context, from: strategy-store }
      - { name: tool.generate_video, from: adapter-video-gen }

  # ── INTEGRATION ───────────────────────────────────────────────────────────────
  - id: weekly-orchestrator
    title: Weekly orchestrator & consolidated brief
    type: integration
    status: approved              # cross-validated (pm-auditor v2.1); W-1/W-2 cleared, 13 tests
    file: specs/weekly-orchestrator/spec.md
    depends_on:
      [client-workspace, agent-seo, agent-geo, agent-reddit, agent-x, agent-linkedin,
       agent-writer, agent-coding, agent-influencer, agent-ugc,
       adapter-social-publish, adapter-cms-publish]
    produces:
      - name: weekly_brief
        shape: "brief{prioritized_items[], per_agent_sections, week_over_week_deltas, approval_queue}"
        consumers: []
    consumes:
      - { name: workspace, from: client-workspace }
      - { name: seo_findings, from: agent-seo }
      - { name: geo_findings, from: agent-geo }
      - { name: reddit_drafts, from: agent-reddit }
      - { name: x_drafts, from: agent-x }
      - { name: linkedin_drafts, from: agent-linkedin }
      - { name: articles, from: agent-writer }
      - { name: pr_set, from: agent-coding }
      - { name: creator_outreach, from: agent-influencer }
      - { name: video_assets, from: agent-ugc }
      - { name: tool.publish_post, from: adapter-social-publish }    # human-gated
      - { name: tool.publish_article, from: adapter-cms-publish }    # human-gated

  # ── INFRA: self-hosted data transport (ADR #7, supersedes #3) ────────────────
  - id: transport-self-hosted
    title: Self-hosted / own-key data Transport
    type: infra
    status: approved              # validator role (pm-auditor v2.1, round 1): 10/10 criteria, adapters byte-identical, 179 green
    file: specs/transport-self-hosted/spec.md
    depends_on: []
    produces:
      - name: transport.selfhosted
        shape: "SelfHostedTransport(config).post(path,body) -> dict | raises; routes scrape->Playwright, search->own-key API, lighthouse->local subprocess, onpage->local HTML parse. No adapter/contract change."
        consumers: [strategy-store, adapter-seo-audit]   # backend swap behind Transport seam, not a DAG edge
    consumes: []

  # ── REFACTOR: shared agent directives (prose; producer-mechanical per ADR #8) ─
  - id: agent-directives
    title: Agent directive revision (shared spine + role blocks)
    type: refactor
    status: approved            # validator round 1 APPROVED (pm-auditor v2.1); 10/10 criteria, single-source verified, 184 green
    file: specs/agent-directives/spec.md
    depends_on: []
    produces:
      - name: agent_directives
        shape: "llm/principles.py {SPINE, VOICE, compose(role, voice=False)}; all 9 agents compose their system prompt from it. No schema/control-flow change."
        consumers: [agent-seo, agent-geo, agent-reddit, agent-x, agent-linkedin, agent-writer, agent-coding, agent-influencer, agent-ugc]
    consumes: []

# ─────────────────────────────────────────────────────────────────────────────
milestones:
  - name: foundation
    specs: [client-workspace, strategy-store]
    status: complete             # both approved
  - name: core-loop              # the SEO -> PR proof + brief
    specs: [adapter-analytics-ingest, adapter-seo-audit, agent-seo, adapter-github-pr, agent-coding]
    status: complete
  - name: ai-search
    specs: [adapter-geo-probe, agent-geo]
    status: complete
  - name: content
    specs: [agent-writer, adapter-cms-publish]
    status: complete
  - name: distribution
    specs: [adapter-reddit-listen, agent-reddit, agent-x, agent-linkedin, adapter-social-publish]
    status: complete
  - name: reach
    specs: [adapter-creator-discovery, agent-influencer, adapter-video-gen, agent-ugc]
    status: complete
  - name: orchestration
    specs: [weekly-orchestrator]
    status: complete
  - name: infra                  # data path ownership (ADR #7)
    specs: [transport-self-hosted]
    status: complete             # approved by independent validator role (round 1)

